<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gastos</title>
<style>
  :root {
    --bg: #0e0e10;
    --bg-elev: #17171b;
    --bg-elev-2: #1f1f24;
    --border: #2a2a30;
    --border-strong: #3a3a42;
    --text: #e8e8ea;
    --text-dim: #9a9aa2;
    --text-muted: #6b6b74;
    --accent: #7dd3a0;
    --accent-dim: #4a8a68;
    --accent-soft: #2f5240;
    --accent-bg: #1a2820;
    --danger: #e07070;
    --warn: #d4a04a;
    --radius: 6px;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, sans-serif;
    font-size: 15px;
    -webkit-font-smoothing: antialiased;
  }

  .app {
    max-width: 960px;
    margin: 0 auto;
    padding: 24px 16px 80px;
    display: grid;
    grid-template-columns: 160px 1fr;
    gap: 20px;
  }

  /* -------- Sidebar -------- */
  .sidebar {
    display: flex; flex-direction: column;
    position: sticky; top: 24px; align-self: start;
    max-height: calc(100vh - 48px);
    padding-right: 4px;
  }
  .brand {
    font-size: 18px; font-weight: 600; letter-spacing: -0.01em;
    padding: 0 10px 20px;
  }
  .section {
    display: flex; flex-direction: column; gap: 2px;
    padding-top: 12px; border-top: 1px solid var(--border);
    margin-top: 12px;
  }
  .section:first-of-type { border-top: none; margin-top: 0; padding-top: 0; }
  .section-title {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--text-muted); padding: 0 10px 6px;
  }
  .v-btn, .tool-btn {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 10px; border: none; background: transparent;
    color: var(--text-dim); font-size: 13px; font-family: inherit;
    text-align: left; cursor: pointer; border-radius: var(--radius);
    width: 100%;
  }
  .v-btn:hover, .tool-btn:hover { background: var(--bg-elev); color: var(--text); }
  .v-btn.on { background: var(--bg-elev); color: var(--text); font-weight: 500; }
  .v-btn.on::before {
    content: ''; width: 3px; height: 14px; background: var(--accent-dim);
    border-radius: 2px; margin-left: -4px;
  }
  .tool-btn { color: var(--text-dim); font-size: 12px; }
  .back-hub {
    display: block; padding: 8px 10px; font-size: 12px;
    color: var(--text-muted); text-decoration: none;
    border-top: 1px solid var(--border); margin-top: 16px; padding-top: 16px;
  }
  .back-hub:hover { color: var(--text); }

  /* -------- Contenido -------- */
  .content { display: flex; flex-direction: column; gap: 14px; min-width: 0; }

  .periodo-nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 2px 4px;
  }
  .periodo-titulo { display: flex; align-items: baseline; gap: 10px; }
  .periodo-titulo #periodo-label { font-size: 16px; font-weight: 500; letter-spacing: -0.01em; }
  .periodo-titulo .badge {
    font-size: 10px; color: var(--text-muted);
    letter-spacing: 0.06em; text-transform: uppercase;
  }
  .nav-btn {
    width: 32px; height: 32px; border-radius: var(--radius);
    background: var(--bg-elev); border: 1px solid var(--border);
    color: var(--text); cursor: pointer; font-size: 12px;
    font-family: inherit;
    display: flex; align-items: center; justify-content: center;
  }
  .nav-btn:hover:not(:disabled) { border-color: var(--border-strong); }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }

  .card {
    background: var(--bg-elev); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px;
  }
  .card h2 {
    margin: 0 0 12px; font-size: 11px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-dim);
  }

  .total-row { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
  .total-valor { font-size: 28px; font-weight: 600; letter-spacing: -0.02em; font-variant-numeric: tabular-nums; }
  .total-unit { color: var(--text-dim); font-size: 15px; }
  .delta { font-size: 12px; margin-left: 4px; }
  .delta .up { color: var(--warn); }
  .delta .down { color: var(--accent); }

  .cats-list { display: flex; flex-direction: column; gap: 10px; }
  .cat-row { display: grid; grid-template-columns: 1fr auto; gap: 12px; align-items: center; }
  .cat-row .nombre { font-size: 14px; }
  .cat-row .monto { font-variant-numeric: tabular-nums; font-size: 14px; }
  .cat-row .bar {
    grid-column: 1 / -1;
    height: 3px; background: var(--bg-elev-2); border-radius: 2px; overflow: hidden;
  }
  .cat-row .bar-fill { height: 100%; background: var(--accent-dim); }
  .empty { color: var(--text-muted); font-size: 14px; text-align: center; padding: 12px 0; }

  /* -------- Formulario -------- */
  form.nuevo { display: grid; gap: 10px; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 4px; }
  input, select {
    width: 100%;
    background: var(--bg-elev-2); color: var(--text);
    border: 1px solid var(--border); border-radius: var(--radius);
    padding: 9px 10px; font-size: 15px; font-family: inherit;
  }
  input:focus, select:focus { outline: none; border-color: var(--accent-dim); }
  input[type="number"] { font-variant-numeric: tabular-nums; }
  select { appearance: none; -webkit-appearance: none; }
  .moneda-toggle {
    display: inline-flex; background: var(--bg-elev-2);
    border: 1px solid var(--border); border-radius: var(--radius);
    padding: 3px; gap: 3px;
  }
  .moneda-toggle button {
    background: transparent; color: var(--text-dim);
    border: none; padding: 6px 12px; font-size: 13px;
    border-radius: 4px; cursor: pointer; font-family: inherit;
  }
  .moneda-toggle button.active { background: var(--accent-dim); color: var(--text); }
  .btn {
    background: var(--accent-dim); color: var(--text);
    border: none; padding: 10px 16px; border-radius: var(--radius);
    cursor: pointer; font-size: 14px; font-weight: 500; font-family: inherit;
  }
  .btn:hover { background: var(--accent); color: var(--bg); }
  .btn-sec {
    background: transparent; color: var(--text-dim);
    border: 1px solid var(--border); padding: 8px 12px;
    border-radius: var(--radius); cursor: pointer;
    font-size: 13px; font-family: inherit;
  }
  .btn-sec:hover { color: var(--text); border-color: var(--text-dim); }
  .btn-danger { color: var(--danger); }
  .btn-danger:hover { color: var(--danger); border-color: var(--danger); }

  /* -------- Lista de gastos -------- */
  ul.gastos { list-style: none; padding: 0; margin: 0; }
  ul.gastos li {
    display: grid; grid-template-columns: auto 1fr auto;
    gap: 12px; align-items: center;
    padding: 12px 0; border-bottom: 1px solid var(--border);
  }
  ul.gastos li:last-child { border-bottom: none; }
  .g-fecha { font-size: 12px; color: var(--text-muted); font-variant-numeric: tabular-nums; min-width: 40px; }
  .g-cat { font-size: 14px; }
  .g-cat .original { display: block; font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .g-monto { font-variant-numeric: tabular-nums; font-size: 15px; text-align: right; }
  .g-actions { display: flex; gap: 4px; margin-top: 6px; justify-content: flex-end; }
  .g-actions button {
    background: transparent; color: var(--text-muted); border: none;
    font-size: 12px; cursor: pointer; padding: 2px 6px; font-family: inherit;
  }
  .g-actions button:hover { color: var(--text); }
  .g-actions .del:hover { color: var(--danger); }
  .lista-nota { font-size: 12px; color: var(--text-muted); text-align: center; padding-top: 12px; }

  /* -------- Evolución -------- */
  .evo-bars {
    display: grid; gap: 6px; height: 110px;
    align-items: end; padding: 4px 0;
  }
  .evo-col { display: flex; flex-direction: column; height: 100%; justify-content: flex-end; gap: 4px; cursor: pointer; }
  .evo-col .v { font-size: 10px; color: var(--text-muted); text-align: center; height: 12px; font-variant-numeric: tabular-nums; }
  .evo-col .bl { background: var(--accent-soft); border-radius: 3px 3px 0 0; min-height: 2px; transition: background 0.15s; }
  .evo-col:hover .bl, .evo-col.here .bl { background: var(--accent-dim); }
  .evo-labels {
    display: grid; gap: 6px; font-size: 11px;
    color: var(--text-dim); text-align: center;
    padding-bottom: 12px; border-bottom: 1px solid var(--border);
    margin-bottom: 12px;
  }
  .cat-evo { display: flex; flex-direction: column; gap: 10px; }
  .cat-evo-row {
    display: grid; grid-template-columns: 1fr auto auto;
    gap: 12px; align-items: center;
  }
  .cat-evo-row .n { font-size: 13px; }
  .cat-evo-row .promedio {
    font-size: 11px; color: var(--text-muted);
    font-variant-numeric: tabular-nums; text-align: right; white-space: nowrap;
  }
  .cat-evo-row svg rect { fill: var(--accent-soft); }
  .cat-evo-row svg rect.actual { fill: var(--accent-dim); }

  /* -------- Modal categorías -------- */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    display: none; align-items: center; justify-content: center; z-index: 10;
    padding: 16px;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: var(--bg-elev); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px;
    max-width: 480px; width: 100%; max-height: 85vh; overflow-y: auto;
  }
  .modal h2 { margin: 0 0 16px; font-size: 16px; text-transform: none; letter-spacing: 0; color: var(--text); }
  .cat-editor { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
  .cat-editor-row { display: grid; grid-template-columns: 1fr auto; gap: 6px; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 12px; }

  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--bg-elev-2); border: 1px solid var(--border);
    padding: 10px 16px; border-radius: var(--radius); font-size: 13px;
    opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 20;
  }
  .toast.show { opacity: 1; }

  /* -------- Responsive -------- */
  @media (max-width: 640px) {
    .app { grid-template-columns: 1fr; gap: 12px; padding: 16px 12px 60px; }
    .sidebar {
      position: static; max-height: none;
      flex-direction: row; overflow-x: auto; gap: 4px;
      padding: 0 0 8px; border-bottom: 1px solid var(--border);
    }
    .brand { display: none; }
    .section {
      flex-direction: row; padding: 0; margin: 0; border-top: none; gap: 4px;
      flex-shrink: 0;
    }
    .section-title { display: none; }
    .v-btn, .tool-btn { white-space: nowrap; padding: 8px 12px; }
    .v-btn.on::before { display: none; }
    .back-hub { display: none; }
    .row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="app">
  <!-- =========== SIDEBAR =========== -->
  <aside class="sidebar">
    <div class="brand">Gastos</div>

    <div class="section">
      <div class="section-title">Vista</div>
      <button class="v-btn" data-v="semana">Semana</button>
      <button class="v-btn on" data-v="mes">Mes</button>
      <button class="v-btn" data-v="trimestre">Trimestre</button>
      <button class="v-btn" data-v="año">Año</button>
      <button class="v-btn" data-v="todo">Todo</button>
    </div>

    <div class="section">
      <div class="section-title">Acciones</div>
      <button class="tool-btn" id="btn-nuevo-side">+ Nuevo gasto</button>
      <button class="tool-btn" id="btn-cats-side">Categorías</button>
    </div>

    <div class="section">
      <div class="section-title">Datos</div>
      <button class="tool-btn" id="btn-seed">Cargar ejemplo</button>
      <button class="tool-btn" id="btn-wipe">Borrar todo</button>
    </div>

    <a class="back-hub" href="/">← Hub</a>
  </aside>

  <!-- =========== CONTENIDO =========== -->
  <main class="content">
    <div class="periodo-nav">
      <button class="nav-btn" id="btn-prev" aria-label="Anterior">◀</button>
      <div class="periodo-titulo">
        <span id="periodo-label">…</span>
        <span class="badge" id="periodo-badge"></span>
      </div>
      <button class="nav-btn" id="btn-next" aria-label="Siguiente">▶</button>
    </div>

    <div class="card">
      <h2>Total</h2>
      <div class="total-row">
        <span class="total-valor" id="total-valor">0</span>
        <span class="total-unit">PHP</span>
        <span class="delta" id="delta"></span>
      </div>
    </div>

    <div class="card">
      <h2>Por categoría</h2>
      <div class="cats-list" id="cats-list">
        <div class="empty">Sin gastos en este periodo</div>
      </div>
    </div>

    <div class="card" id="form-card">
      <h2>Nuevo gasto</h2>
      <form class="nuevo" id="form-nuevo" autocomplete="off">
        <div class="row">
          <div>
            <label for="cantidad">Cantidad</label>
            <input type="number" id="cantidad" step="0.01" min="0" required inputmode="decimal" />
          </div>
          <div>
            <label>Moneda</label>
            <div class="moneda-toggle" role="group" aria-label="Moneda">
              <button type="button" id="btn-php" class="active">PHP</button>
              <button type="button" id="btn-eur">EUR</button>
            </div>
          </div>
        </div>
        <div id="wrap-tasa" style="display:none;">
          <label for="tasa">Tasa de cambio (1 EUR = X PHP)</label>
          <input type="number" id="tasa" step="0.01" min="0" inputmode="decimal" />
        </div>
        <div class="row">
          <div>
            <label for="categoria">Categoría</label>
            <select id="categoria" required></select>
          </div>
          <div>
            <label for="fecha">Fecha</label>
            <input type="date" id="fecha" required />
          </div>
        </div>
        <div style="display:flex; justify-content:flex-end; margin-top: 4px;">
          <button type="submit" class="btn" id="btn-guardar">Añadir</button>
        </div>
      </form>
    </div>

    <div class="card">
      <h2>Movimientos</h2>
      <ul class="gastos" id="lista-gastos">
        <li><div class="empty" style="grid-column: 1 / -1;">Aún no hay gastos en este periodo</div></li>
      </ul>
      <div class="lista-nota" id="lista-nota"></div>
    </div>

    <div class="card">
      <h2 id="evo-titulo">Evolución</h2>
      <div class="evo-bars" id="evo-bars"></div>
      <div class="evo-labels" id="evo-labels"></div>
      <div class="cat-evo" id="cat-evo"></div>
    </div>
  </main>
</div>

<!-- Modal de categorías -->
<div class="modal-bg" id="modal-cats">
  <div class="modal">
    <h2>Gestionar categorías</h2>
    <div class="cat-editor" id="cat-editor"></div>
    <div class="cat-editor-row">
      <input type="text" id="nueva-cat" placeholder="Añadir nueva categoría" />
      <button class="btn-sec" id="btn-add-cat">Añadir</button>
    </div>
    <div class="modal-actions">
      <button class="btn-sec" id="btn-cancelar-cats">Cancelar</button>
      <button class="btn" id="btn-guardar-cats">Guardar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ---------- Estado ----------
  let categorias = [];
  let todosGastos = [];
  let vista = 'mes';
  let offset = 0;
  let editandoId = null;
  let moneda = 'PHP';

  const $ = sel => document.querySelector(sel);
  const NM = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  const NML = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

  // ---------- Helpers ----------
  function fmt(n) {
    return Number(n).toLocaleString('es-ES', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }
  function fmtEntero(n) { return Math.round(Number(n)).toLocaleString('es-ES'); }
  function fmtK(n) {
    n = Number(n);
    if (n >= 10000) return Math.round(n / 1000) + 'k';
    if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
    return Math.round(n).toString();
  }
  function hoyISO() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
  }
  function inicioSemana(d) {
    const x = new Date(d);
    const dow = (x.getDay() + 6) % 7;
    x.setDate(x.getDate() - dow);
    x.setHours(0, 0, 0, 0);
    return x;
  }
  function toast(msg) {
    const t = $('#toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 1800);
  }

  // ---------- Periodo ----------
  function periodo(v, off) {
    const hoy = new Date();
    if (v === 'semana') {
      const ini = inicioSemana(hoy);
      ini.setDate(ini.getDate() + off * 7);
      const fin = new Date(ini);
      fin.setDate(fin.getDate() + 6);
      return {
        desde: ini, hasta: fin,
        label: `${ini.getDate()} ${NM[ini.getMonth()]} — ${fin.getDate()} ${NM[fin.getMonth()]}`,
        esActual: off === 0
      };
    }
    if (v === 'mes') {
      const ini = new Date(hoy.getFullYear(), hoy.getMonth() + off, 1);
      const fin = new Date(ini.getFullYear(), ini.getMonth() + 1, 0);
      return {
        desde: ini, hasta: fin,
        label: `${NML[ini.getMonth()]} ${ini.getFullYear()}`,
        esActual: off === 0
      };
    }
    if (v === 'trimestre') {
      const qActual = Math.floor(hoy.getMonth() / 3);
      const iniMes = qActual * 3 + off * 3;
      const ini = new Date(hoy.getFullYear(), iniMes, 1);
      const fin = new Date(ini.getFullYear(), ini.getMonth() + 3, 0);
      const qn = Math.floor(ini.getMonth() / 3) + 1;
      return {
        desde: ini, hasta: fin,
        label: `Q${qn} ${ini.getFullYear()} · ${NM[ini.getMonth()]}–${NM[ini.getMonth() + 2]}`,
        esActual: off === 0
      };
    }
    if (v === 'año') {
      const y = hoy.getFullYear() + off;
      return {
        desde: new Date(y, 0, 1), hasta: new Date(y, 11, 31),
        label: String(y), esActual: off === 0
      };
    }
    // todo
    const timestamps = todosGastos.map(g => new Date(g.date).getTime());
    const primer = timestamps.length ? new Date(Math.min(...timestamps)) : hoy;
    return {
      desde: primer, hasta: hoy,
      label: 'Todo el historial', esActual: true
    };
  }

  function filtrarPeriodo(desde, hasta) {
    const a = desde.getTime();
    const b = hasta.getTime() + 86400000 - 1;
    return todosGastos
      .filter(g => {
        const t = new Date(g.date).getTime();
        return t >= a && t <= b;
      })
      .sort((x, y) => (y.date + y.created_at).localeCompare(x.date + x.created_at));
  }

  function evoConfig() {
    if (vista === 'semana') return { n: 8, labelFn: p => `${p.desde.getDate()}/${p.desde.getMonth() + 1}`, sub: 'semanas' };
    if (vista === 'mes') return { n: 6, labelFn: p => NM[p.desde.getMonth()], sub: 'meses' };
    if (vista === 'trimestre') return { n: 4, labelFn: p => `Q${Math.floor(p.desde.getMonth() / 3) + 1}'${String(p.desde.getFullYear()).slice(2)}`, sub: 'trimestres' };
    if (vista === 'año') return { n: 3, labelFn: p => String(p.desde.getFullYear()), sub: 'años' };
    return { n: 6, labelFn: p => NM[p.desde.getMonth()], sub: 'meses' };
  }

  // ---------- API ----------
  async function api(url, opts = {}) {
    const res = await fetch(url, {
      ...opts,
      headers: { 'Content-Type': 'application/json', ...(opts.headers || {}) }
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({ error: res.statusText }));
      throw new Error(err.error || 'Error');
    }
    return res.json();
  }

  async function cargar() {
    categorias = await api('/gastos/api/categorias');
    todosGastos = await api('/gastos/api/gastos');
    render();
  }

  // ---------- Render ----------
  function render() {
    // Sidebar
    document.querySelectorAll('.v-btn').forEach(b => b.classList.toggle('on', b.dataset.v === vista));

    // Periodo actual
    const p = periodo(vista, offset);
    $('#periodo-label').textContent = p.label;
    $('#periodo-badge').textContent = p.esActual && vista !== 'todo' ? 'actual' : '';
    $('#btn-prev').disabled = vista === 'todo';
    $('#btn-next').disabled = vista === 'todo' || offset >= 0;

    const gastosPeriodo = filtrarPeriodo(p.desde, p.hasta);
    const total = gastosPeriodo.reduce((s, g) => s + Number(g.amount_php), 0);

    // Total + delta
    $('#total-valor').textContent = fmtEntero(total);
    if (vista !== 'todo') {
      const pPrev = periodo(vista, offset - 1);
      const totalPrev = filtrarPeriodo(pPrev.desde, pPrev.hasta).reduce((s, g) => s + Number(g.amount_php), 0);
      if (totalPrev > 0) {
        const pct = ((total - totalPrev) / totalPrev) * 100;
        const clase = pct >= 0 ? 'up' : 'down';
        const signo = pct >= 0 ? '+' : '';
        $('#delta').innerHTML = `<span class="${clase}">${signo}${pct.toFixed(0)}% vs anterior</span>`;
      } else {
        $('#delta').innerHTML = '';
      }
    } else {
      $('#delta').innerHTML = '';
    }

    // Categorías
    renderCategoriasBreakdown(gastosPeriodo, total);

    // Categorías del select del formulario
    renderCategoriasSelect();

    // Movimientos
    renderLista(gastosPeriodo);

    // Evolución
    renderEvolucion();
  }

  function renderCategoriasBreakdown(gastosPeriodo, total) {
    const porCat = {};
    for (const g of gastosPeriodo) porCat[g.category] = (porCat[g.category] || 0) + Number(g.amount_php);
    const filas = Object.entries(porCat).sort((a, b) => b[1] - a[1]);
    const max = filas[0] ? filas[0][1] : 0;
    const cont = $('#cats-list');
    if (!filas.length) {
      cont.innerHTML = '<div class="empty">Sin gastos en este periodo</div>';
      return;
    }
    cont.innerHTML = filas.map(([cat, val]) => {
      const pct = max ? (val / max) * 100 : 0;
      return `
        <div class="cat-row">
          <span class="nombre">${escapeHtml(cat)}</span>
          <span class="monto">${fmt(val)} PHP</span>
          <div class="bar"><div class="bar-fill" style="width:${pct}%"></div></div>
        </div>`;
    }).join('');
  }

  function renderCategoriasSelect() {
    const sel = $('#categoria');
    const prev = sel.value;
    sel.innerHTML = categorias.map(c => `<option>${escapeHtml(c)}</option>`).join('');
    if (categorias.includes(prev)) sel.value = prev;
  }

  function renderLista(gastosPeriodo) {
    const ul = $('#lista-gastos');
    const nota = $('#lista-nota');
    if (!gastosPeriodo.length) {
      ul.innerHTML = '<li><div class="empty" style="grid-column: 1 / -1;">Aún no hay gastos en este periodo</div></li>';
      nota.textContent = '';
      return;
    }
    const LIMITE = 30;
    const mostrar = gastosPeriodo.slice(0, LIMITE);
    nota.textContent = gastosPeriodo.length > LIMITE
      ? `Mostrando ${LIMITE} de ${gastosPeriodo.length} movimientos`
      : '';
    ul.innerHTML = mostrar.map(g => {
      const [y, m, d] = g.date.split('-');
      const fechaCorta = vista === 'semana' || vista === 'mes'
        ? d
        : `${d}/${m}`;
      const original = g.currency === 'EUR'
        ? `<span class="original">${fmt(g.amount_original)} EUR · tasa ${g.exchange_rate}</span>`
        : '';
      return `
        <li>
          <span class="g-fecha">${fechaCorta}</span>
          <span class="g-cat">${escapeHtml(g.category)}${original}</span>
          <span>
            <div class="g-monto">${fmt(g.amount_php)} PHP</div>
            <div class="g-actions">
              <button data-id="${g.id}" class="rep">repetir</button>
              <button data-id="${g.id}" class="edit">editar</button>
              <button data-id="${g.id}" class="del">borrar</button>
            </div>
          </span>
        </li>`;
    }).join('');
  }

  function renderEvolucion() {
    const cfg = evoConfig();
    const vistaEvo = vista === 'todo' ? 'mes' : vista;
    const periodos = [];
    for (let i = cfg.n - 1; i >= 0; i--) periodos.push(periodo(vistaEvo, offset - i));
    const totales = periodos.map(pp => filtrarPeriodo(pp.desde, pp.hasta).reduce((s, g) => s + Number(g.amount_php), 0));
    const maxT = Math.max(...totales, 1);

    $('#evo-titulo').textContent = `Evolución · últimos ${cfg.n} ${cfg.sub}`;

    const bars = $('#evo-bars');
    const labels = $('#evo-labels');
    bars.style.gridTemplateColumns = `repeat(${cfg.n}, 1fr)`;
    labels.style.gridTemplateColumns = `repeat(${cfg.n}, 1fr)`;
    bars.innerHTML = periodos.map((pp, i) => {
      const h = (totales[i] / maxT) * 100;
      const here = i === cfg.n - 1;
      return `
        <div class="evo-col ${here ? 'here' : ''}" data-i="${i}" title="${pp.label}: ${fmt(totales[i])} PHP">
          <div class="v">${totales[i] > 0 ? fmtK(totales[i]) : ''}</div>
          <div class="bl" style="height:${h}%"></div>
        </div>`;
    }).join('');
    labels.innerHTML = periodos.map(pp => `<div>${cfg.labelFn(pp)}</div>`).join('');

    // Click en barra = navega ahí (solo si no es "todo")
    if (vista !== 'todo') {
      bars.querySelectorAll('.evo-col').forEach(el => {
        el.addEventListener('click', () => {
          const i = Number(el.dataset.i);
          offset = offset - (cfg.n - 1 - i);
          render();
        });
      });
    }

    // Cat evolución
    const porCatMes = {};
    for (const g of todosGastos) {
      let idx = -1;
      for (let i = 0; i < periodos.length; i++) {
        const pp = periodos[i];
        const t = new Date(g.date).getTime();
        if (t >= pp.desde.getTime() && t <= pp.hasta.getTime() + 86400000 - 1) { idx = i; break; }
      }
      if (idx === -1) continue;
      if (!porCatMes[g.category]) porCatMes[g.category] = Array(cfg.n).fill(0);
      porCatMes[g.category][idx] += Number(g.amount_php);
    }
    const filasCat = Object.entries(porCatMes)
      .map(([cat, arr]) => ({ cat, arr, total: arr.reduce((a, b) => a + b, 0) }))
      .filter(f => f.total > 0)
      .sort((a, b) => b.total - a.total);

    const contEvo = $('#cat-evo');
    if (!filasCat.length) {
      contEvo.innerHTML = '';
      return;
    }
    contEvo.innerHTML = filasCat.map(f => {
      const max = Math.max(...f.arr, 1);
      const avg = f.total / cfg.n;
      const barW = 8, gap = 2, h = 22;
      const svgW = cfg.n * barW + (cfg.n - 1) * gap;
      const barras = f.arr.map((v, i) => {
        const bh = max ? (v / max) * h : 0;
        const x = i * (barW + gap);
        const y = h - bh;
        const esActual = i === cfg.n - 1;
        return `<rect class="${esActual ? 'actual' : ''}" x="${x}" y="${y}" width="${barW}" height="${bh}" rx="1"><title>${fmt(v)} PHP</title></rect>`;
      }).join('');
      return `
        <div class="cat-evo-row">
          <span class="n">${escapeHtml(f.cat)}</span>
          <svg width="${svgW}" height="${h}" viewBox="0 0 ${svgW} ${h}">${barras}</svg>
          <span class="promedio">${fmtK(avg)}/${cfg.sub.slice(0, -1)}</span>
        </div>`;
    }).join('');
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }

  // ---------- Sidebar: vista + navegador ----------
  document.querySelectorAll('.v-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      vista = btn.dataset.v;
      offset = 0;
      render();
    });
  });
  $('#btn-prev').addEventListener('click', () => {
    if (vista === 'todo') return;
    offset -= 1; render();
  });
  $('#btn-next').addEventListener('click', () => {
    if (vista === 'todo' || offset >= 0) return;
    offset += 1; render();
  });

  // ---------- Sidebar: acciones ----------
  $('#btn-nuevo-side').addEventListener('click', () => {
    $('#form-card').scrollIntoView({ behavior: 'smooth', block: 'start' });
    setTimeout(() => $('#cantidad').focus(), 300);
  });
  $('#btn-cats-side').addEventListener('click', () => abrirModalCats());

  // ---------- Moneda toggle ----------
  $('#btn-php').addEventListener('click', () => setMoneda('PHP'));
  $('#btn-eur').addEventListener('click', () => setMoneda('EUR'));
  function setMoneda(m) {
    moneda = m;
    $('#btn-php').classList.toggle('active', m === 'PHP');
    $('#btn-eur').classList.toggle('active', m === 'EUR');
    $('#wrap-tasa').style.display = m === 'EUR' ? 'block' : 'none';
    if (m === 'EUR' && !$('#tasa').value) $('#tasa').focus();
  }

  // ---------- Formulario ----------
  $('#form-nuevo').addEventListener('submit', async (e) => {
    e.preventDefault();
    const cantidad = Number($('#cantidad').value);
    const tasa = moneda === 'EUR' ? Number($('#tasa').value) : null;
    if (!cantidad || cantidad <= 0) return toast('Cantidad inválida');
    if (moneda === 'EUR' && (!tasa || tasa <= 0)) return toast('Falta la tasa de cambio');

    const payload = {
      amount_original: cantidad,
      currency: moneda,
      exchange_rate: tasa,
      category: $('#categoria').value,
      date: $('#fecha').value
    };

    try {
      if (editandoId) {
        await api(`/gastos/api/gastos/${editandoId}`, { method: 'PUT', body: JSON.stringify(payload) });
        toast('Gasto actualizado');
        editandoId = null;
        $('#btn-guardar').textContent = 'Añadir';
      } else {
        await api('/gastos/api/gastos', { method: 'POST', body: JSON.stringify(payload) });
        toast('Gasto añadido');
      }
      $('#cantidad').value = '';
      $('#tasa').value = '';
      todosGastos = await api('/gastos/api/gastos');
      render();
    } catch (err) {
      toast(err.message);
    }
  });

  // ---------- Acciones sobre gastos ----------
  $('#lista-gastos').addEventListener('click', async (e) => {
    const btn = e.target.closest('button');
    if (!btn) return;
    const id = btn.dataset.id;
    const g = todosGastos.find(x => x.id === id);
    if (!g) return;

    if (btn.classList.contains('rep')) {
      $('#cantidad').value = g.amount_original;
      setMoneda(g.currency);
      if (g.currency === 'EUR') $('#tasa').value = g.exchange_rate;
      $('#categoria').value = g.category;
      $('#fecha').value = hoyISO();
      editandoId = null;
      $('#btn-guardar').textContent = 'Añadir';
      $('#form-card').scrollIntoView({ behavior: 'smooth' });
      toast('Datos copiados, revisa y añade');
    } else if (btn.classList.contains('edit')) {
      $('#cantidad').value = g.amount_original;
      setMoneda(g.currency);
      if (g.currency === 'EUR') $('#tasa').value = g.exchange_rate;
      $('#categoria').value = g.category;
      $('#fecha').value = g.date;
      editandoId = id;
      $('#btn-guardar').textContent = 'Guardar cambios';
      $('#form-card').scrollIntoView({ behavior: 'smooth' });
    } else if (btn.classList.contains('del')) {
      if (!confirm(`¿Borrar el gasto de ${fmt(g.amount_php)} PHP en "${g.category}"?`)) return;
      try {
        await api(`/gastos/api/gastos/${id}`, { method: 'DELETE' });
        todosGastos = todosGastos.filter(x => x.id !== id);
        render();
        toast('Gasto borrado');
      } catch (err) { toast(err.message); }
    }
  });

  // ---------- Modal categorías ----------
  $('#btn-cancelar-cats').addEventListener('click', () => cerrarModalCats());
  $('#modal-cats').addEventListener('click', (e) => {
    if (e.target.id === 'modal-cats') cerrarModalCats();
  });

  function abrirModalCats() {
    renderEditorCats();
    $('#modal-cats').classList.add('open');
  }
  function cerrarModalCats() {
    $('#modal-cats').classList.remove('open');
    $('#nueva-cat').value = '';
  }

  function renderEditorCats() {
    $('#cat-editor').innerHTML = categorias.map((c, i) => `
      <div class="cat-editor-row">
        <input type="text" data-i="${i}" value="${escapeHtml(c)}" />
        <button class="btn-sec btn-danger" data-i="${i}">×</button>
      </div>`).join('');
    $('#cat-editor').querySelectorAll('button').forEach(b => {
      b.addEventListener('click', () => {
        categorias.splice(Number(b.dataset.i), 1);
        renderEditorCats();
      });
    });
    $('#cat-editor').querySelectorAll('input').forEach(inp => {
      inp.addEventListener('input', () => {
        categorias[Number(inp.dataset.i)] = inp.value;
      });
    });
  }

  $('#btn-add-cat').addEventListener('click', () => {
    const val = $('#nueva-cat').value.trim();
    if (!val) return;
    categorias.push(val);
    $('#nueva-cat').value = '';
    renderEditorCats();
  });

  $('#btn-guardar-cats').addEventListener('click', async () => {
    const limpias = categorias.map(c => c.trim()).filter(Boolean);
    if (!limpias.length) return toast('Necesitas al menos una categoría');
    try {
      await api('/gastos/api/categorias', { method: 'PUT', body: JSON.stringify({ categorias: limpias }) });
      categorias = limpias;
      render();
      cerrarModalCats();
      toast('Categorías guardadas');
    } catch (err) { toast(err.message); }
  });

  // ---------- Seed / Wipe ----------
  $('#btn-seed').addEventListener('click', async () => {
    const msg = todosGastos.length
      ? `Se añadirán ~90 gastos de ejemplo encima de los ${todosGastos.length} que ya tienes. ¿Continuar?`
      : '¿Añadir 6 meses de gastos de ejemplo (incluye viaje a España en EUR)?';
    if (!confirm(msg)) return;
    try {
      const r = await api('/gastos/api/seed', { method: 'POST' });
      toast(`${r.count} gastos añadidos`);
      todosGastos = await api('/gastos/api/gastos');
      render();
    } catch (err) { toast(err.message); }
  });

  $('#btn-wipe').addEventListener('click', async () => {
    const c = prompt('Esto borrará TODOS los gastos (no las categorías). Escribe BORRAR para confirmar:');
    if (c !== 'BORRAR') return;
    try {
      await api('/gastos/api/gastos', { method: 'DELETE' });
      todosGastos = [];
      render();
      toast('Todos los gastos borrados');
    } catch (err) { toast(err.message); }
  });

  // ---------- Init ----------
  $('#fecha').value = hoyISO();
  cargar().catch(err => toast(err.message));
</script>
